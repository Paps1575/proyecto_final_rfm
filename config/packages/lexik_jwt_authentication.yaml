lexik_jwt_authentication:
    # Estas rutas son relativas a la carpeta del proyecto dentro de Docker
    secret_key: '%kernel.project_dir%/config/jwt/private.pem'
    public_key: '%kernel.project_dir%/config/jwt/public.pem'

    # Usamos pass_phrase con guion bajo como pidió tu versión del bundle
    pass_phrase: '%env(JWT_PASSPHRASE)%'

    token_extractors:
        authorization_header:
            enabled: true
            prefix:  Bearer
        cookie:
            enabled: true
            name:    BEARER
